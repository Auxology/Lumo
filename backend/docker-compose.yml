services:
  seq:
    image: datalust/seq:2025.2
    container_name: lumo-seq
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
    ports:
      - 5341:80
      - 5342:5342
    volumes:
      - seq-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  auth-db:
    image: postgres:18-alpine
    container_name: lumo-auth-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth_dev_password
      POSTGRES_DB: auth
    ports:
      - 5432:5432
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  seq-data:
    driver: local
  auth-db-data:
    driver: local
